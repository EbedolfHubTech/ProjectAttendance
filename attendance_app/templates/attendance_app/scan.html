<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scan Student QR Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-dark text-white">
    <div class="container text-center mt-5">
        <h2 class="mb-4">Hold Student QR Code up to Camera</h2>
        
        <div id="reader" class="mx-auto bg-white rounded shadow-lg overflow-hidden" style="width: 350px; max-width: 100%; min-height: 250px; color: #333;"></div>
        
        <div id="status-msg" class="mt-3 text-warning">Starting camera...</div>

        <br>
        <a href="/" class="btn btn-light btn-md mt-2">⬅️ Return to Dashboard</a>
    </div>

    <script>
      let html5QrCode;

      function onScanSuccess(studentId) {
        // Stop scanning temporarily after a successful read
        if (html5QrCode) {
            html5QrCode.pause();
        }

        fetch('/mark-attendance/', {
          method: 'POST',
          headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': '{{ csrf_token }}'
          },
          body: JSON.stringify({ student_id: studentId })
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);
            // Resume scanning after alert is dismissed
            if (html5QrCode) {
                html5QrCode.resume();
            }
        })
        .catch(err => {
            console.error("Error processing scan: ", err);
            if (html5QrCode) {
                html5QrCode.resume();
            }
        });
      }

      // Initialize direct camera stream (Bypasses default file-upload UI completely)
      document.addEventListener("DOMContentLoaded", function () {
          html5QrCode = new Html5Qrcode("reader");
          
          const config = { fps: 10, qrbox: { width: 250, height: 250 } };

          html5QrCode.start(
              { facingMode: "environment" }, 
              config, 
              onScanSuccess
          ).then(() => {
              document.getElementById("status-msg").innerText = "Camera active. Place QR code in front of lens.";
              document.getElementById("status-msg").className = "mt-3 text-success";
          }).catch(err => {
              console.error("Camera access error: ", err);
              document.getElementById("status-msg").innerText = "Unable to access camera. Please allow camera permissions in your browser.";
              document.getElementById("status-msg").className = "mt-3 text-danger";
          });
      });
    </script>
</body>
</html>
