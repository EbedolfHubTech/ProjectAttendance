<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scan Student QR Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* CSS guardrail to hide any file scan inputs/links rendered by html5-qrcode */
        #reader__filescan_input,
        a[href="#scan-using-file"],
        .html5-qrcode-element-scantype-file {
            display: none !important;
        }
    </style>
</head>
<body class="bg-dark text-white">
    <div class="container text-center mt-5">
        <h2 class="mb-4">Hold Student QR Code up to Camera</h2>
        
        <div id="reader" class="mx-auto bg-white rounded shadow-lg" style="width: 350px; max-width: 100%; overflow: hidden; color: #333;"></div>
        
        <br>
        <a href="/" class="btn btn-light btn-md mt-3">⬅️ Return to Dashboard</a>
    </div>

    <script>
      function onScanSuccess(studentId) {
        fetch('/mark-attendance/', {
          method: 'POST',
          headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': '{{ csrf_token }}'
          },
          body: JSON.stringify({ student_id: studentId })
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);
        })
        .catch(err => {
            console.error("Error processing scan: ", err);
        });
      }

      // Restrict scanner strictly to live camera input
      let html5QrcodeScanner = new Html5QrcodeScanner(
          "reader", 
          { 
              fps: 10, 
              qrbox: 250,
              supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
          }
      );
      html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
